name: ci

on:
  push:
  pull_request:

jobs:
  sqlite-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest -q

  postgres-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: registry
          POSTGRES_USER: registry
          POSTGRES_PASSWORD: registry
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U registry -d registry"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://registry:registry@127.0.0.1:5432/registry
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest -q tests/test_postgres_smoke.py

  packaging-and-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: python -m build
      - run: |
          python -m venv /tmp/research-registry-wheel
          /tmp/research-registry-wheel/bin/pip install --upgrade pip
          /tmp/research-registry-wheel/bin/pip install dist/*.whl
          /tmp/research-registry-wheel/bin/python -c "import importlib.metadata; print(importlib.metadata.version('research-registry'))"
          /tmp/research-registry-wheel/bin/python -m research_registry.local_install --help
          /tmp/research-registry-wheel/bin/python -m research_registry.local_status
      - run: |
          python -m venv /tmp/research-registry-sdist
          /tmp/research-registry-sdist/bin/pip install --upgrade pip
          /tmp/research-registry-sdist/bin/pip install dist/*.tar.gz
          /tmp/research-registry-sdist/bin/python -c "import importlib.metadata; print(importlib.metadata.version('research-registry'))"
          /tmp/research-registry-sdist/bin/python -m research_registry.local_install --help
          /tmp/research-registry-sdist/bin/python -m research_registry.local_status
      - run: docker build -t research-registry:test .
      - run: cp deploy/.env.example deploy/.env
      - run: docker compose -f deploy/compose.yaml --env-file deploy/.env config
      - run: |
          python - <<'PY'
          from pathlib import Path
          root = Path("deploy/kubernetes")
          for path in root.glob("*.yaml"):
              content = path.read_text(encoding="utf-8")
              assert "apiVersion:" in content, path
              assert "kind:" in content, path
          PY

  local-installer-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: RUN_LOCAL_INSTALL_SMOKE=1 pytest -q tests/test_local_install_smoke.py

  shared-compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: RUN_SHARED_COMPOSE_SMOKE=1 pytest -q tests/test_shared_compose_smoke.py
